<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | MoonDesk</title>
  </head>
  <body>
    <div id="app">
      <main class="card">
        <div class="logo-container">
          <div class="logo-icon">M</div>
          <h1>MoonDesk</h1>
          <p class="body-medium text-center" style="color: var(--surface-on-surface-variant)">
            Log in to manage your workspace
          </p>
        </div>

        <form id="login-form">
          <div class="form-group" style="margin-bottom: var(--size-5)">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@company.com" required />
          </div>

          <div class="form-group" style="margin-bottom: var(--size-3)">
            <div style="display: flex; justify-content: space-between; align-items: center">
              <label for="password" class="form-label">Password</label>
              <a href="#" class="body-small link">Forgot?</a>
            </div>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>

          <div style="display: flex; gap: var(--size-2); align-items: center; margin-bottom: var(--size-6)">
            <input type="checkbox" id="remember" style="width: auto; height: auto" />
            <label for="remember" class="body-small" style="color: var(--surface-on-surface-variant)">Remember me</label>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px">
            Continue
          </button>
        </form>

        <div class="text-center" style="margin-top: var(--size-4)">
          <p class="body-small" style="color: var(--surface-on-surface-variant)">
            Don't have an account? <a href="#" class="link">Sign up</a>
          </p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
